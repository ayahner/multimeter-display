<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <title>{% block title %}OWON Display{% endblock %}</title>
  <style>
    :root {
      color-scheme: dark;
      --accent: #ffb347;
      --accent-soft: #ffd7a1;
      --bg: #090909;
      --panel: #171717;
      --panel-2: #1f1f1f;
      --border: rgba(255, 179, 71, 0.28);
      --text: #f4e7d4;
      --muted: #c7aa82;
      --shadow: 0 12px 36px rgba(0, 0, 0, 0.35);
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    a {
      color: #79b8ff;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .muted {
      color: var(--muted);
    }

      {
      % block extra_css %
    }

      {
      % endblock %
    }
  </style>
</head>

<body>
  {% block content %}{% endblock %}
</body>

</html>
